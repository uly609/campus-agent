name: campusflow-ci

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build services
        run: docker compose build
      - name: Start dependencies
        run: docker compose up -d postgres redis neo4j
      - name: Seed
        run: make seed
      - name: Lint
        run: make lint
      - name: Typecheck
        run: make typecheck
      - name: Test
        run: make test
      - name: Eval
        run: make eval
      - name: E2E
        run: make e2e
      - name: Smoke
        run: make smoke
